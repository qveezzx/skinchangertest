<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Skin Changer | Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #00d4aa;
            --text: #eaeaea;
            --text-secondary: #a8a8a8;
            --border: #2d3561;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--highlight), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
            letter-spacing: 1px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--success);
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--success);
            animation: pulse 2s infinite;
        }

        .status-badge::before {
            content: '●';
            margin-right: 8px;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(0, 212, 170, 0); }
        }

        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }

        .card:hover {
            border-color: var(--highlight);
            box-shadow: 0 8px 32px rgba(233, 69, 96, 0.1);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--highlight);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--highlight), var(--success));
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: var(--text);
            font-weight: 500;
        }

        select, input[type="range"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:hover, input:hover {
            border-color: var(--highlight);
            background: rgba(15, 52, 96, 0.8);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--highlight);
            box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.1);
            background: rgba(15, 52, 96, 1);
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--highlight);
            border: 2px solid var(--text);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--highlight);
            border: 2px solid var(--text);
            border-radius: 50%;
            cursor: pointer;
        }

        .range-value {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--highlight);
            font-weight: 600;
        }

        .preview {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border-left: 3px solid var(--success);
            animation: slideUp 0.4s ease-out;
        }

        .preview-item {
            font-size: 0.9em;
            margin-bottom: 8px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-item strong {
            color: var(--text);
            font-weight: 600;
        }

        .preview-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 8px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--highlight), #ff6b7a);
            color: white;
            border: none;
            grid-column: 1 / -1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(15, 52, 96, 0.8);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(15, 52, 96, 1);
            border-color: var(--highlight);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(0, 212, 170, 0.05);
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: var(--success);
            color: var(--primary);
            border-radius: 6px;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.error {
            background: var(--highlight);
            color: white;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 25px 0;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 2em;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⚔️ CS2 SKIN CHANGER</div>
            <p class="subtitle">Modern Web-Based Skinchanger Interface</p>
            <div class="status-badge" id="statusBadge">Connected</div>
        </header>

        <div class="main-grid">
            <!-- Knife Card -->
            <div class="card">
                <div class="card-title">🔪 Knife Selection</div>
                <div class="form-group">
                    <label for="knifeSelect">Choose Your Knife</label>
                    <select id="knifeSelect">
                        <option value="0">Default Knife</option>
                    </select>
                </div>
                <div class="preview" id="knifePreview">
                    <div class="preview-item">
                        <span><span class="preview-icon"></span>Selected:</span>
                        <strong id="knifeSelected">Default Knife</strong>
                    </div>
                </div>
            </div>

            <!-- Gloves Card -->
            <div class="card">
                <div class="card-title">🧤 Gloves Selection</div>
                <div class="form-group">
                    <label for="glovesSelect">Choose Your Gloves</label>
                    <select id="glovesSelect">
                        <option value="0">No Gloves</option>
                    </select>
                </div>
                <div class="preview" id="glovesPreview">
                    <div class="preview-item">
                        <span><span class="preview-icon"></span>Selected:</span>
                        <strong id="glovesSelected">No Gloves</strong>
                    </div>
                </div>
            </div>

            <!-- Paint Kit Card -->
            <div class="card">
                <div class="card-title">🎨 Paint Kit</div>
                <div class="form-group">
                    <label for="paintKit">Paint Kit Index</label>
                    <input type="number" id="paintKit" min="0" max="10000" value="0">
                </div>
                <div class="form-group">
                    <label for="wear">Wear Value</label>
                    <input type="range" id="wear" min="0" max="1" step="0.01" value="0.01">
                    <div class="range-value"><span id="wearValue">0.01</span></div>
                </div>
                <div class="form-group">
                    <label for="seed">Seed Value</label>
                    <input type="number" id="seed" min="0" max="2147483647" value="0">
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Stats Section -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalApplied">0</div>
                <div class="stat-label">Skins Applied</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastUpdate">--:--</div>
                <div class="stat-label">Last Update</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connectionStatus">●</div>
                <div class="stat-label">Connection</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div style="margin-top: 30px;">
            <div class="button-group">
                <button class="btn btn-primary" id="applyBtn" onclick="applySkin()">
                    ✨ APPLY SKINS
                </button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetSkins()">
                    ↻ RESET
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        const WS_URL = 'ws://localhost:3000';
        
        let currentConfig = {};
        let ws = null;
        let appliedCount = 0;

        // Initialize WebSocket
        function initWebSocket() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatusBadge(true);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'initial-state') {
                    currentConfig = data.config;
                    updateUI();
                } else if (data.type === 'skin-applied') {
                    showNotification('✨ Skins Applied Successfully!');
                    appliedCount++;
                    document.getElementById('totalApplied').textContent = appliedCount;
                    updateLastUpdate();
                } else if (data.type === 'skin-reset') {
                    showNotification('🔄 Skins Reset');
                    resetUI();
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatusBadge(false);
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateStatusBadge(false);
                setTimeout(initWebSocket, 3000);
            };
        }

        // Load knife options
        async function loadKnives() {
            try {
                const response = await fetch(`${API_URL}/api/knives`);
                const knives = await response.json();
                const select = document.getElementById('knifeSelect');
                
                knives.forEach(knife => {
                    const option = document.createElement('option');
                    option.value = knife.id;
                    option.textContent = knife.name;
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => {
                    document.getElementById('knifeSelected').textContent = e.target.options[e.target.selectedIndex].text;
                });
            } catch (error) {
                console.error('Error loading knives:', error);
                showNotification('Failed to load knives', 'error');
            }
        }

        // Load glove options
        async function loadGloves() {
            try {
                const response = await fetch(`${API_URL}/api/gloves`);
                const gloves = await response.json();
                const select = document.getElementById('glovesSelect');
                
                gloves.forEach(glove => {
                    const option = document.createElement('option');
                    option.value = glove.id;
                    option.textContent = glove.name;
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => {
                    document.getElementById('glovesSelected').textContent = e.target.options[e.target.selectedIndex].text;
                });
            } catch (error) {
                console.error('Error loading gloves:', error);
                showNotification('Failed to load gloves', 'error');
            }
        }

        // Apply skins
        async function applySkin() {
            const knifeSelect = document.getElementById('knifeSelect');
            const glovesSelect = document.getElementById('glovesSelect');
            const paintKit = parseInt(document.getElementById('paintKit').value);
            const wear = parseFloat(document.getElementById('wear').value);
            const seed = parseInt(document.getElementById('seed').value);

            const payload = {
                knife: {
                    defIndex: parseInt(knifeSelect.value),
                    name: knifeSelect.options[knifeSelect.selectedIndex].text
                },
                gloves: {
                    defIndex: parseInt(glovesSelect.value),
                    name: glovesSelect.options[glovesSelect.selectedIndex].text
                },
                paintKit,
                wear,
                seed
            };

            try {
                document.getElementById('applyBtn').disabled = true;
                const response = await fetch(`${API_URL}/api/skin/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.success) {
                    currentConfig = result.config;
                } else {
                    showNotification('Failed to apply skins', 'error');
                }
            } catch (error) {
                console.error('Error applying skins:', error);
                showNotification('Error applying skins', 'error');
            } finally {
                document.getElementById('applyBtn').disabled = false;
            }
        }

        // Reset skins
        async function resetSkins() {
            try {
                const response = await fetch(`${API_URL}/api/skin/reset`, { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    resetUI();
                }
            } catch (error) {
                console.error('Error resetting skins:', error);
                showNotification('Error resetting skins', 'error');
            }
        }

        // Update UI
        function updateUI() {
            if (currentConfig.knife) {
                document.getElementById('knifeSelect').value = currentConfig.knife.defIndex;
                document.getElementById('knifeSelected').textContent = currentConfig.knife.name;
            }
            if (currentConfig.gloves) {
                document.getElementById('glovesSelect').value = currentConfig.gloves.defIndex;
                document.getElementById('glovesSelected').textContent = currentConfig.gloves.name;
            }
            document.getElementById('paintKit').value = currentConfig.paintKit || 0;
            document.getElementById('wear').value = currentConfig.wear || 0.01;
            document.getElementById('wearValue').textContent = (currentConfig.wear || 0.01).toFixed(2);
            document.getElementById('seed').value = currentConfig.seed || 0;
        }

        // Reset UI
        function resetUI() {
            document.getElementById('knifeSelect').value = 0;
            document.getElementById('glovesSelect').value = 0;
            document.getElementById('paintKit').value = 0;
            document.getElementById('wear').value = 0.01;
            document.getElementById('wearValue').textContent = '0.01';
            document.getElementById('seed').value = 0;
            document.getElementById('knifeSelected').textContent = 'Default Knife';
            document.getElementById('glovesSelected').textContent = 'No Gloves';
        }

        // Update wear display
        document.getElementById('wear').addEventListener('input', (e) => {
            document.getElementById('wearValue').textContent = parseFloat(e.target.value).toFixed(2);
        });

        // Show notification
        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification${type === 'error' ? ' error' : ''}`;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => notif.remove(), 3000);
        }

        // Update status badge
        function updateStatusBadge(connected) {
            const badge = document.getElementById('statusBadge');
            const connStatus = document.getElementById('connectionStatus');
            
            if (connected) {
                badge.textContent = '● Connected';
                connStatus.textContent = '●';
                connStatus.style.color = 'var(--success)';
            } else {
                badge.textContent = '● Reconnecting...';
                connStatus.textContent = '○';
                connStatus.style.color = 'var(--highlight)';
            }
        }

        // Update last update time
        function updateLastUpdate() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = time;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            loadKnives();
            loadGloves();
            initWebSocket();
            updateLastUpdate();
        });

        // Sync time every minute
        setInterval(updateLastUpdate, 60000);
    </script>
</body>
</html>
