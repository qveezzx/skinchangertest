name: Build CS2 Mod Utility

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  release:
    types: [created]

env:
  SOLUTION_FILE_PATH: CS2Mod-Utility/Osiris.sln
  BUILD_PLATFORM: x64
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      with:
        msbuild-version: latest

    - name: Build solution
      run: msbuild "${{ env.SOLUTION_FILE_PATH }}" /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.BUILD_PLATFORM }}

    - name: Verify build output
      run: |
        if (!(Test-Path "CS2Mod-Utility\${{ env.BUILD_PLATFORM }}\${{ env.BUILD_CONFIGURATION }}\Osiris.dll")) {
          Write-Host "Build failed: DLL not found"
          exit 1
        }
        Write-Host "Build successful: DLL found"
        Get-Item "CS2Mod-Utility\${{ env.BUILD_PLATFORM }}\${{ env.BUILD_CONFIGURATION }}\Osiris.dll"

    - name: Create artifacts directory
      run: mkdir build_artifacts

    - name: Copy DLL to artifacts
      run: copy "CS2Mod-Utility\${{ env.BUILD_PLATFORM }}\${{ env.BUILD_CONFIGURATION }}\Osiris.dll" "build_artifacts\"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CS2ModUtility-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}
        path: build_artifacts/
        retention-days: 30

    - name: Upload release asset (on release)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build_artifacts/Osiris.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Post build download link
      if: success()
      run: |
        Write-Host "=== Build Successful ==="
        Write-Host "Repository: ${{ github.repository }}"
        Write-Host "Commit: ${{ github.sha }}"
        Write-Host "Branch: ${{ github.ref }}"
        Write-Host "Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        Write-Host "========================"

