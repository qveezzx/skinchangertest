<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Skin Manager - Secure Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1f1f1f;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --accent: #444444;
            --success: #4a9d6f;
            --warning: #7d6a47;
            --danger: #6f4a4a;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: 200px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .sidebar-menu {
            flex: 1;
            padding: 10px 0;
        }

        .menu-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all 0.2s;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .menu-item.active {
            border-left-color: var(--accent);
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .menu-icon {
            width: 16px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* MAIN CONTENT */
        .main {
            background: var(--bg-primary);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-info {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* PANELS */
        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel-header {
            background: var(--bg-tertiary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .panel-body {
            padding: 16px;
        }

        /* FORM ELEMENTS */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        select, input[type="number"], input[type="range"] {
            width: 100%;
            padding: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        select:hover, input:hover {
            border-color: var(--accent);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--text-secondary);
            background: var(--bg-tertiary);
        }

        input[type="range"] {
            padding: 0;
            height: 4px;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
        }

        /* PREVIEW */
        .preview {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .preview-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 10px;
        }

        .preview-value {
            color: var(--text-primary);
            word-break: break-all;
        }

        /* BUTTONS */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .button-group.full {
            grid-template-columns: 1fr;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--text-secondary);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: var(--success);
            border-color: var(--success);
            color: var(--bg-primary);
        }

        .btn-success:hover {
            background: #5aad7f;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        /* WEAPONS GRID */
        .weapons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }

        .weapon-btn {
            padding: 12px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .weapon-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .weapon-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .weapon-icon {
            font-size: 20px;
        }

        /* NOTIFICATIONS */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 12px 16px;
            font-size: 12px;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        .notification.success {
            border-color: var(--success);
            color: var(--success);
        }

        .notification.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .weapons-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">CS2 Manager</div>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" onclick="switchPanel('weapons')">
                    <span class="menu-icon">🔫</span>
                    <span>Weapons</span>
                </div>
                <div class="menu-item" onclick="switchPanel('knives')">
                    <span class="menu-icon">🔪</span>
                    <span>Knives</span>
                </div>
                <div class="menu-item" onclick="switchPanel('gloves')">
                    <span class="menu-icon">🧤</span>
                    <span>Gloves</span>
                </div>
                <div class="menu-item" onclick="switchPanel('paint')">
                    <span class="menu-icon">🎨</span>
                    <span>Paint Kit</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div><span class="status-dot"></span>Connected</div>
                <div id="connectionStatus" style="margin-top: 8px; font-size: 10px;">Ready</div>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="header">
                <div>
                    <div class="header-title">Skin Configuration</div>
                    <div class="header-info" id="headerInfo">Idle</div>
                </div>
                <div id="lastUpdate" style="text-align: right; font-size: 11px; color: var(--text-secondary);">
                    Updated: --:--
                </div>
            </div>

            <div class="content">
                <!-- STATS -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="appliedCount">0</div>
                        <div class="stat-label">Applied</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statusText">●</div>
                        <div class="stat-label">Status</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="wearDisplay">0.01</div>
                        <div class="stat-label">Wear</div>
                    </div>
                </div>

                <!-- WEAPONS PANEL -->
                <div class="panel active" id="weapons-panel">
                    <div class="panel-header">Select Primary Weapon</div>
                    <div class="panel-body">
                        <div class="weapons-grid" id="weaponsGrid"></div>
                        <div class="form-group">
                            <label>Currently Equipped</label>
                            <select id="weaponSelect" onchange="updateWeaponPreview()">
                                <option value="0">None</option>
                            </select>
                        </div>
                        <div class="preview">
                            <div class="preview-item">
                                <div class="preview-label">Weapon</div>
                                <div class="preview-value" id="weaponName">None</div>
                            </div>
                            <div class="preview-item">
                                <div class="preview-label">Type</div>
                                <div class="preview-value" id="weaponType">---</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KNIVES PANEL -->
                <div class="panel" id="knives-panel">
                    <div class="panel-header">Select Knife Model</div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>Knife Type</label>
                            <select id="knifeSelect" onchange="updateKnifePreview()">
                                <option value="0">Default Knife</option>
                            </select>
                        </div>
                        <div class="preview">
                            <div class="preview-item">
                                <div class="preview-label">Knife</div>
                                <div class="preview-value" id="knifeName">Default</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- GLOVES PANEL -->
                <div class="panel" id="gloves-panel">
                    <div class="panel-header">Select Glove Model</div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>Glove Type</label>
                            <select id="glovesSelect" onchange="updateGlovesPreview()">
                                <option value="0">No Gloves</option>
                            </select>
                        </div>
                        <div class="preview">
                            <div class="preview-item">
                                <div class="preview-label">Gloves</div>
                                <div class="preview-value" id="glovesName">None</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PAINT KIT PANEL -->
                <div class="panel" id="paint-panel">
                    <div class="panel-header">Paint Kit Configuration</div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>Paint Kit Index</label>
                            <input type="number" id="paintKit" min="0" value="0" onchange="updatePaintPreview()">
                        </div>
                        <div class="form-group">
                            <label>Wear Value</label>
                            <input type="range" id="wear" min="0" max="1" step="0.01" value="0.01" onchange="updatePaintPreview()">
                            <div style="text-align: right; margin-top: 4px; color: var(--text-secondary); font-size: 11px;">
                                <span id="wearValue">0.01</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Seed Value</label>
                            <input type="number" id="seed" min="0" max="2147483647" value="0" onchange="updatePaintPreview()">
                        </div>
                        <div class="preview">
                            <div class="preview-item">
                                <div class="preview-label">Paint</div>
                                <div class="preview-value" id="paintValue">0</div>
                            </div>
                            <div class="preview-item">
                                <div class="preview-label">Wear</div>
                                <div class="preview-value" id="wearPreviewValue">0.01</div>
                            </div>
                            <div class="preview-item">
                                <div class="preview-label">Seed</div>
                                <div class="preview-value" id="seedValue">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div style="margin-top: 20px; display: grid; gap: 8px;">
                    <button class="btn btn-success" onclick="applySkins()" style="grid-column: 1/-1; padding: 12px;">APPLY CONFIGURATION</button>
                    <button class="btn" onclick="resetSkins()">RESET</button>
                    <button class="btn" onclick="saveSkins()">SAVE PRESET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        const WS_URL = 'ws://localhost:3000';
        
        let currentConfig = {};
        let ws = null;
        let appliedCount = 0;
        let allWeapons = [];

        // Initialize WebSocket
        function initWebSocket() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('Connected');
                document.getElementById('statusText').textContent = '●';
                document.getElementById('statusText').style.color = 'var(--success)';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'initial-state') {
                    currentConfig = data.config;
                    updateUI();
                } else if (data.type === 'skin-applied') {
                    showNotification('✓ Skins Applied', 'success');
                    appliedCount++;
                    document.getElementById('appliedCount').textContent = appliedCount;
                    updateTime();
                }
            };

            ws.onerror = () => {
                document.getElementById('statusText').textContent = '○';
                document.getElementById('statusText').style.color = 'var(--danger)';
            };

            ws.onclose = () => {
                document.getElementById('statusText').textContent = '○';
                document.getElementById('statusText').style.color = 'var(--danger)';
                setTimeout(initWebSocket, 3000);
            };
        }

        // Load weapons
        async function loadWeapons() {
            try {
                const res = await fetch(`${API_URL}/api/weapons`);
                allWeapons = await res.json();
                
                const weaponsGrid = document.getElementById('weaponsGrid');
                
                // Render grid
                allWeapons.slice(0, 12).forEach(w => {
                    const btn = document.createElement('button');
                    btn.className = 'weapon-btn';
                    btn.innerHTML = `<span class="weapon-icon">${w.icon}</span><span>${w.name.substring(0, 10)}</span>`;
                    btn.onclick = () => selectWeapon(w);
                    weaponsGrid.appendChild(btn);
                });

                // Populate dropdown
                const select = document.getElementById('weaponSelect');
                allWeapons.forEach(w => {
                    const opt = document.createElement('option');
                    opt.value = w.id;
                    opt.textContent = `${w.icon} ${w.name}`;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading weapons:', e);
            }
        }

        // Load knives
        async function loadKnives() {
            try {
                const res = await fetch(`${API_URL}/api/knives`);
                const knives = await res.json();
                const select = document.getElementById('knifeSelect');
                
                knives.forEach(k => {
                    const opt = document.createElement('option');
                    opt.value = k.id;
                    opt.textContent = k.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading knives:', e);
            }
        }

        // Load gloves
        async function loadGloves() {
            try {
                const res = await fetch(`${API_URL}/api/gloves`);
                const gloves = await res.json();
                const select = document.getElementById('glovesSelect');
                
                gloves.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Error loading gloves:', e);
            }
        }

        // Select weapon from grid
        function selectWeapon(weapon) {
            document.getElementById('weaponSelect').value = weapon.id;
            updateWeaponPreview();
        }

        // Update previews
        function updateWeaponPreview() {
            const id = document.getElementById('weaponSelect').value;
            const weapon = allWeapons.find(w => w.id == id);
            if (weapon) {
                document.getElementById('weaponName').textContent = weapon.name;
                document.getElementById('weaponType').textContent = weapon.category;
            }
        }

        function updateKnifePreview() {
            const text = document.getElementById('knifeSelect').options[document.getElementById('knifeSelect').selectedIndex].text;
            document.getElementById('knifeName').textContent = text;
        }

        function updateGlovesPreview() {
            const text = document.getElementById('glovesSelect').options[document.getElementById('glovesSelect').selectedIndex].text;
            document.getElementById('glovesName').textContent = text;
        }

        function updatePaintPreview() {
            document.getElementById('paintValue').textContent = document.getElementById('paintKit').value;
            document.getElementById('wearValue').textContent = parseFloat(document.getElementById('wear').value).toFixed(2);
            document.getElementById('wearPreviewValue').textContent = parseFloat(document.getElementById('wear').value).toFixed(2);
            document.getElementById('wearDisplay').textContent = parseFloat(document.getElementById('wear').value).toFixed(2);
            document.getElementById('seedValue').textContent = document.getElementById('seed').value;
        }

        // Apply skins
        async function applySkins() {
            const weaponSelect = document.getElementById('weaponSelect');
            const weapon = allWeapons.find(w => w.id == weaponSelect.value) || { id: 0, name: 'None' };
            const knife = { defIndex: parseInt(document.getElementById('knifeSelect').value), name: document.getElementById('knifeSelect').options[document.getElementById('knifeSelect').selectedIndex].text };
            const gloves = { defIndex: parseInt(document.getElementById('glovesSelect').value), name: document.getElementById('glovesSelect').options[document.getElementById('glovesSelect').selectedIndex].text };

            try {
                const res = await fetch(`${API_URL}/api/skin/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        weapon,
                        knife,
                        gloves,
                        paintKit: parseInt(document.getElementById('paintKit').value),
                        wear: parseFloat(document.getElementById('wear').value),
                        seed: parseInt(document.getElementById('seed').value)
                    })
                });
                const result = await res.json();
                if (result.success) {
                    showNotification('✓ Configuration Applied', 'success');
                }
            } catch (e) {
                showNotification('✗ Failed to apply', 'error');
            }
        }

        // Reset skins
        async function resetSkins() {
            try {
                await fetch(`${API_URL}/api/skin/reset`, { method: 'POST' });
                document.getElementById('weaponSelect').value = 0;
                document.getElementById('knifeSelect').value = 0;
                document.getElementById('glovesSelect').value = 0;
                document.getElementById('paintKit').value = 0;
                document.getElementById('wear').value = 0.01;
                document.getElementById('seed').value = 0;
                updateWeaponPreview();
                updateKnifePreview();
                updateGlovesPreview();
                updatePaintPreview();
                showNotification('✓ Reset to Defaults', 'success');
            } catch (e) {
                showNotification('✗ Failed to reset', 'error');
            }
        }

        // Save preset (local)
        function saveSkins() {
            const preset = {
                weapon: document.getElementById('weaponSelect').value,
                knife: document.getElementById('knifeSelect').value,
                gloves: document.getElementById('glovesSelect').value,
                paintKit: document.getElementById('paintKit').value,
                wear: document.getElementById('wear').value,
                seed: document.getElementById('seed').value
            };
            localStorage.setItem('cs2_preset', JSON.stringify(preset));
            showNotification('✓ Preset Saved', 'success');
        }

        // Notifications
        function showNotification(msg, type) {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Panel switching
        function switchPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            document.getElementById(`${panel}-panel`).classList.add('active');
            event.target.closest('.menu-item').classList.add('active');
        }

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = `Updated: ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
        }

        // Update UI from config
        function updateUI() {
            if (currentConfig.weapon) document.getElementById('weaponSelect').value = currentConfig.weapon.defIndex || 0;
            if (currentConfig.knife) document.getElementById('knifeSelect').value = currentConfig.knife.defIndex || 0;
            if (currentConfig.gloves) document.getElementById('glovesSelect').value = currentConfig.gloves.defIndex || 0;
            document.getElementById('paintKit').value = currentConfig.paintKit || 0;
            document.getElementById('wear').value = currentConfig.wear || 0.01;
            document.getElementById('seed').value = currentConfig.seed || 0;
            updateWeaponPreview();
            updateKnifePreview();
            updateGlovesPreview();
            updatePaintPreview();
        }

        // Initialize
        window.addEventListener('load', () => {
            loadWeapons();
            loadKnives();
            loadGloves();
            initWebSocket();
            updateTime();
            setInterval(updateTime, 60000);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                applySkins();
            }
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                resetSkins();
            }
        });
    </script>
</body>
</html>
